  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

<span style=\"font-family:'Söhne Mono',monospace; font-size:12px; color:rgba(22,35,53,0.5);\">{{ aFlagCount }} found<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:12px; display:grid; gap:0;\">\n          <sc-for list=\"{{ aRedFlags }}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div style=\"display:grid; grid-template-columns:200px 1fr 150px; gap:16px; align-items:baseline; padding:9px 0; border-top:1px solid rgba(158,59,40,0.16);\">\n              <div style=\"font-size:15px; font-weight:500; color:#9E3B28;\">{{ f.flag }}<\u002Fdiv>\n              <div style=\"font-size:14.5px; line-height:1.45; color:rgba(22,35,53,0.85);\">{{ f.detail }}<\u002Fdiv>\n              <div style=\"font-family:'Söhne Mono',monospace; font-size:12px; color:rgba(22,35,53,0.5);\">{{ f.source }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- identity + decision -->\n    <div style=\"margin-top:18px; display:flex; align-items:flex-start; justify-content:space-between; gap:24px; flex-wrap:wrap;\">\n      <div style=\"min-width:0;\">\n        <h1 style=\"margin:0; font-size:36px; font-weight:500; letter-spacing:-0.03em; line-height:1.0;\">{{ aName }}<\u002Fh1>\n        <div style=\"margin-top:7px; font-size:17px; color:rgba(22,35,53,0.72);\">{{ aRole }} · <span style=\"font-family:'Tiempos Headline',Georgia,serif; font-style:italic; font-size:19px;\">{{ aCompany }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:11px; align-items:flex-end;\">\n        <span style=\"display:inline-block; font-family:'Söhne Mono',monospace; font-size:15px; color:{{ aDColor }}; background:{{ aDBg }}; border:1px solid {{ aDBorder }}; border-radius:9999px; padding:6px 16px;\">{{ aDLabel }}<\u002Fspan>\n        <div style=\"display:flex; align-items:center; gap:16px;\">\n          <a href=\"{{ aWorkableUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'Söhne Mono',monospace; font-size:12.5px; color:#9E3B28; text-decoration:none;\" style-hover=\"text-decoration:underline;\">Open in Workable ↗<\u002Fa>\n          <button onclick=\"{{ toggleActiveDq }}\" style=\"cursor:pointer; border:none; background:transparent; color:{{ aDqColor }}; font-family:'Söhne Mono',monospace; font-size:12.5px; padding:0; text-decoration:underline; text-underline-offset:3px;\">{{ aDqLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- short decision read (default view) -->\n    <div style=\"margin-top:20px; max-width:860px;\">\n      <sc-for list=\"{{ readRows }}\" as=\"r\" hint-placeholder-count=\"5\">\n        <div style=\"display:grid; grid-template-columns:120px 1fr; gap:18px; align-items:baseline; padding:11px 0; border-top:1px solid rgba(22,35,53,0.10);\">\n          <div style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; letter-spacing:0.04em; text-transform:uppercase; color:{{ r.labelColor }};\">{{ r.label }}<\u002Fdiv>\n          <div style=\"font-size:15.5px; line-height:1.5; color:#162335; text-wrap:pretty;\">{{ r.value }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- reviewer signal -->\n    <div style=\"margin-top:14px; display:flex; gap:10px; align-items:flex-start; background:{{ aRevBg }}; border-left:2px solid {{ aRevBar }}; padding:10px 13px; max-width:760px;\">\n      <span style=\"width:8px; height:8px; border-radius:9999px; background:{{ aRevDot }}; margin-top:6px; flex-shrink:0;\"><\u002Fspan>\n      <div><span style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; letter-spacing:0.04em; text-transform:uppercase; color:{{ aRevColor }};\">Reviewer signal — {{ aRevLabel }}. <\u002Fspan><span style=\"font-size:14.5px; line-height:1.45; color:rgba(22,35,53,0.82);\">{{ aRevNote }}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ aHasCorrections }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:12px; display:flex; align-items:center; gap:10px; background:rgba(231,68,36,0.06); border-left:2px solid #E74424; padding:9px 13px; max-width:760px; flex-wrap:wrap;\">\n        <span style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em; color:#E74424;\">{{ aCorrCount }} correction(s) applied<\u002Fspan>\n        <span style=\"font-size:14px; color:rgba(22,35,53,0.78);\">Claude updated this record from your notes — see the working file below.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- re-analysis (human signal) -->\n    <sc-if value=\"{{ aHasReanalysis }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:14px; border:1px solid rgba(158,59,40,0.25); border-top:2px solid #9E3B28; background:rgba(158,59,40,0.04); padding:16px 20px; max-width:760px;\">\n        <div style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; letter-spacing:0.05em; text-transform:uppercase; color:#9E3B28;\">Re-analysis · human signal — {{ aReanReviewer }}<\u002Fdiv>\n        <div style=\"margin-top:9px; display:flex; align-items:center; gap:12px; font-size:17px; font-weight:500;\"><span style=\"color:rgba(22,35,53,0.55); text-decoration:line-through;\">{{ aReanBefore }}<\u002Fspan><span style=\"color:rgba(22,35,53,0.4);\">→<\u002Fspan><span style=\"color:#9E3B28;\">{{ aReanAfter }}<\u002Fspan><\u002Fdiv>\n        <div style=\"margin-top:9px; font-size:14.5px; line-height:1.5; color:rgba(22,35,53,0.85);\">{{ aReanRec }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ aHideDeep }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:24px;\">\n        <button onclick=\"{{ runDeep }}\" style=\"cursor:pointer; border:1px solid #162335; background:transparent; color:#162335; border-radius:9999px; padding:9px 18px; font-family:'Söhne Mono',monospace; font-size:12.5px; white-space:nowrap;\">Run deep analysis anyway →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ aShowDeep }}\" hint-placeholder-val=\"{{ true }}\">\n\n    <!-- ===== COMPARE STRIP: ask + RO level vs pool ===== -->\n    <div style=\"margin-top:26px; border:1px solid rgba(22,35,53,0.12); background:#fff; display:grid; grid-template-columns:1fr 1fr 1.5fr;\">\n      <div style=\"padding:18px 22px; border-right:1px solid rgba(22,35,53,0.10);\">\n        <div style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; letter-spacing:0.04em; text-transform:uppercase; color:rgba(22,35,53,0.5);\">Salary ask<\u002Fdiv>\n        <div style=\"margin-top:7px; font-family:'Söhne Mono',monospace; font-size:30px; font-weight:500; color:#162335;\">{{ aSalary }}<\u002Fdiv>\n        <div style=\"margin-top:4px; font-size:14px; line-height:1.4; color:{{ aAskColor }};\">{{ aAskTier }} · {{ aAskNote }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:18px 22px; border-right:1px solid rgba(22,35,53,0.10);\">\n        <div style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; letter-spacing:0.04em; text-transform:uppercase; color:rgba(22,35,53,0.5);\">RO level<\u002Fdiv>\n        <div style=\"margin-top:7px; font-family:'Söhne Mono',monospace; font-size:30px; font-weight:500; color:#162335;\">{{ aRoLevel }}<\u002Fdiv>\n        <div style=\"margin-top:4px; font-size:14px; line-height:1.4; color:rgba(22,35,53,0.7);\">{{ aRoVsPool }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:18px 22px; background:{{ aMismatchBg }};\">\n        <div style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; letter-spacing:0.04em; text-transform:uppercase; color:{{ aMismatchLabelColor }};\">{{ aMismatchLabel }}<\u002Fdiv>\n        <div style=\"margin-top:7px; font-size:17px; line-height:1.4; font-weight:500; color:#162335; text-wrap:pretty;\">{{ aMismatchRead }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== RO TIME PROGRESSION ===== -->\n    <div style=\"margin-top:38px;\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; border-bottom:1px solid rgba(22,35,53,0.15); padding-bottom:9px;\">\n        <h2 style=\"margin:0; font-size:23px; font-weight:500; letter-spacing:-0.02em;\">RO-style time progression<\u002Fh2>\n        <div style=\"display:flex; align-items:center; gap:10px;\">\n          <sc-if value=\"{{ tlEditing }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ addRole }}\" style=\"cursor:pointer; border:1px solid rgba(22,35,53,0.22); background:transparent; color:#162335; border-radius:9999px; padding:4px 11px; font-family:'Söhne Mono',monospace; font-size:11.5px;\">+ Role<\u002Fbutton>\n            <button onclick=\"{{ addGap }}\" style=\"cursor:pointer; border:1px solid rgba(22,35,53,0.22); background:transparent; color:#162335; border-radius:9999px; padding:4px 11px; font-family:'Söhne Mono',monospace; font-size:11.5px;\">+ Gap<\u002Fbutton>\n            <button onclick=\"{{ addCert }}\" style=\"cursor:pointer; border:1px solid rgba(22,35,53,0.22); background:transparent; color:#162335; border-radius:9999px; padding:4px 11px; font-family:'Söhne Mono',monospace; font-size:11.5px;\">+ Cert<\u002Fbutton>\n          <\u002Fsc-if>\n          <button onclick=\"{{ toggleTlEdit }}\" style=\"cursor:pointer; border:none; background:transparent; color:{{ tlEditColor }}; font-family:'Söhne Mono',monospace; font-size:12px; text-decoration:underline; text-underline-offset:3px; padding:0;\">{{ tlEditLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:104px 1.05fr 1.2fr 64px 1.35fr 150px 124px; gap:0; padding:10px 6px; font-family:'Söhne Mono',monospace; font-size:10.5px; letter-spacing:0.03em; text-transform:uppercase; color:rgba(22,35,53,0.42); border-bottom:1px solid rgba(22,35,53,0.09);\">\n        <div>Period<\u002Fdiv><div>Org / school<\u002Fdiv><div>Role<\u002Fdiv><div>Tenure<\u002Fdiv><div>Level / scope<\u002Fdiv><div>Language level<\u002Fdiv><div>Signal<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ timelineRows }}\" as=\"r\" hint-placeholder-count=\"6\">\n        <div style=\"display:grid; grid-template-columns:104px 1.05fr 1.2fr 64px 1.35fr 150px 124px; gap:0; padding:11px 6px; align-items:baseline; border-bottom:1px solid rgba(22,35,53,0.08); background:{{ r.bg }};\">\n          <input value=\"{{ r.period }}\" onchange=\"{{ r.onPeriod }}\" readonly=\"{{ r.ro }}\" style=\"width:100%; border:none; border-bottom:1px solid {{ r.bb }}; background:transparent; outline:none; padding:2px 4px 2px 0; font-family:'Söhne Mono',monospace; font-size:13px; color:{{ r.periodColor }};\" style-focus=\"border-bottom-color:#E74424;\">\n          <input value=\"{{ r.org }}\" onchange=\"{{ r.onOrg }}\" readonly=\"{{ r.ro }}\" style=\"width:100%; border:none; border-bottom:1px solid {{ r.bb }}; background:transparent; outline:none; padding:2px 8px 2px 0; font-size:14.5px; color:{{ r.orgColor }}; font-style:{{ r.orgStyle }}; font-family:{{ r.orgFont }};\" style-focus=\"border-bottom-color:#E74424;\">\n          <input value=\"{{ r.role }}\" onchange=\"{{ r.onRole }}\" readonly=\"{{ r.ro }}\" style=\"width:100%; border:none; border-bottom:1px solid {{ r.bb }}; background:transparent; outline:none; padding:2px 8px 2px 0; font-size:14.5px; color:#162335; font-family:'National 2',sans-serif;\" style-focus=\"border-bottom-color:#E74424;\">\n          <input value=\"{{ r.tenure }}\" onchange=\"{{ r.onTenure }}\" readonly=\"{{ r.ro }}\" style=\"width:100%; border:none; border-bottom:1px solid {{ r.bb }}; background:transparent; outline:none; padding:2px 4px 2px 0; font-family:'Söhne Mono',monospace; font-size:13px; color:rgba(22,35,53,0.7);\" style-focus=\"border-bottom-color:#E74424;\">\n          <input value=\"{{ r.scope }}\" onchange=\"{{ r.onScope }}\" readonly=\"{{ r.ro }}\" style=\"width:100%; border:none; border-bottom:1px solid {{ r.bb }}; background:transparent; outline:none; padding:2px 10px 2px 0; font-size:13.5px; color:rgba(22,35,53,0.78); font-family:'National 2',sans-serif;\" style-focus=\"border-bottom-color:#E74424;\">\n          <div style=\"font-size:13px; color:{{ r.langColor }}; padding-right:10px; line-height:1.4;\">{{ r.lang }}<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:7px;\"><span style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; color:{{ r.sigColor }}; background:{{ r.sigBg }}; border-radius:9999px; padding:2px 9px; white-space:nowrap;\">{{ r.signal }}<\u002Fspan><sc-if value=\"{{ tlEditing }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ r.remove }}\" style=\"cursor:pointer; border:none; background:transparent; color:#9E3B28; font-size:16px; line-height:1; padding:0;\">×<\u002Fbutton><\u002Fsc-if><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <\u002Fsc-if>\n\n    <!-- ===== COVER LETTER w/ margin comments ===== -->\n    <div style=\"margin-top:42px;\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; border-bottom:1px solid rgba(22,35,53,0.15); padding-bottom:9px;\">\n        <h2 style=\"margin:0; font-size:23px; font-weight:500; letter-spacing:-0.02em;\">Cover letter<\u002Fh2>\n      <\u002Fdiv>\n      <sc-if value=\"{{ aHasCover }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-top:14px; display:grid; grid-template-columns:1fr 300px; gap:36px; align-items:start;\">\n          <div style=\"background:#fff; border:1px solid rgba(22,35,53,0.10); padding:30px 34px; font-size:16px; line-height:1.75; color:#162335;\">\n            <sc-for list=\"{{ coverLines }}\" as=\"ln\" hint-placeholder-count=\"5\">\n              <span style=\"background:{{ ln.hl }}; padding:1px 0; box-decoration-break:clone; -webkit-box-decoration-break:clone;\">{{ ln.t }}<\u002Fspan><span> <\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <sc-for list=\"{{ coverComments }}\" as=\"cm\" hint-placeholder-count=\"3\">\n              <div style=\"border:1px solid rgba(22,35,53,0.12); border-left:3px solid {{ cm.color }}; background:#fff; padding:11px 13px; box-shadow:0 1px 0 rgba(22,35,53,0.05);\">\n                <div style=\"display:flex; align-items:center; gap:7px;\"><span style=\"width:18px; height:18px; border-radius:9999px; background:{{ cm.color }}; color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-family:'Söhne Mono',monospace;\">C<\u002Fspan><span style=\"font-family:'Söhne Mono',monospace; font-size:11px; letter-spacing:0.03em; text-transform:uppercase; color:{{ cm.color }};\">{{ cm.label }}<\u002Fspan><\u002Fdiv>\n                <div style=\"margin-top:6px; font-size:13.5px; line-height:1.45; color:rgba(22,35,53,0.85);\">{{ cm.note }}<\u002Fdiv>\n                <input value=\"{{ cm.reply }}\" onchange=\"{{ cm.onReply }}\" placeholder=\"↳ Reply to train Claude…\" style=\"margin-top:9px; width:100%; border:none; border-top:1px solid rgba(22,35,53,0.10); background:transparent; outline:none; padding:8px 0 0; font-family:'National 2',sans-serif; font-size:13px; color:#162335;\" style-focus=\"border-top-color:#E74424;\">\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ aNoCover }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:14px; border:1px dashed rgba(158,59,40,0.4); background:rgba(158,59,40,0.04); padding:18px 22px; font-size:15px; color:#9E3B28;\">No cover letter submitted. <span style=\"color:rgba(22,35,53,0.7);\">For a role built on care and detail, a blank cover letter is itself a signal.<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- ===== APPLICATION ANSWERS w/ margin comments ===== -->\n    <div style=\"margin-top:42px;\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; border-bottom:1px solid rgba(22,35,53,0.15); padding-bottom:9px;\">\n        <h2 style=\"margin:0; font-size:23px; font-weight:500; letter-spacing:-0.02em;\">Application answers<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"margin-top:14px; display:flex; flex-direction:column; gap:16px;\">\n        <sc-for list=\"{{ answerRows }}\" as=\"qa\" hint-placeholder-count=\"3\">\n          <div style=\"display:grid; grid-template-columns:1fr 300px; gap:36px; align-items:start;\">\n            <div style=\"background:#fff; border:1px solid rgba(22,35,53,0.10); border-left:3px solid {{ qa.bar }}; padding:18px 22px;\">\n              <div style=\"font-family:'Söhne Mono',monospace; font-size:12px; letter-spacing:0.02em; color:rgba(22,35,53,0.5);\">{{ qa.q }}<\u002Fdiv>\n              <div style=\"margin-top:8px; font-size:15.5px; line-height:1.6; color:#162335;\"><span style=\"background:{{ qa.hl }}; padding:1px 0;\">{{ qa.a }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ qa.hasComment }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"border:1px solid rgba(22,35,53,0.12); border-left:3px solid {{ qa.color }}; background:#fff; padding:11px 13px;\">\n                <div style=\"display:flex; align-items:center; gap:7px;\"><span style=\"width:18px; height:18px; border-radius:9999px; background:{{ qa.color }}; color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-family:'Söhne Mono',monospace;\">C<\u002Fspan><span style=\"font-family:'Söhne Mono',monospace; font-size:11px; letter-spacing:0.03em; text-transform:uppercase; color:{{ qa.color }};\">{{ qa.label }}<\u002Fspan><\u002Fdiv>\n                <div style=\"margin-top:6px; font-size:13.5px; line-height:1.45; color:rgba(22,35,53,0.85);\">{{ qa.note }}<\u002Fdiv>\n                <input value=\"{{ qa.reply }}\" onchange=\"{{ qa.onReply }}\" placeholder=\"↳ Reply to train Claude…\" style=\"margin-top:9px; width:100%; border:none; border-top:1px solid rgba(22,35,53,0.10); background:transparent; outline:none; padding:8px 0 0; font-family:'National 2',sans-serif; font-size:13px; color:#162335;\" style-focus=\"border-top-color:#E74424;\">\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== LOGISTICS CHECK ===== -->\n    <div style=\"margin-top:42px;\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; border-bottom:1px solid rgba(22,35,53,0.15); padding-bottom:9px;\">\n        <h2 style=\"margin:0; font-size:23px; font-weight:500; letter-spacing:-0.02em;\">Logistics check<\u002Fh2>\n        <span style=\"font-family:'Söhne Mono',monospace; font-size:12px; color:rgba(22,35,53,0.5);\">{{ aLogMode }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px; display:grid; grid-template-columns:280px 1fr; gap:36px; align-items:start;\">\n        <div style=\"border:1px solid rgba(22,35,53,0.12); background:#fff; padding:18px 20px;\">\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:10px;\"><span style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em; color:rgba(22,35,53,0.5);\">Likelihood<\u002Fspan><span style=\"font-family:'Söhne Mono',monospace; font-size:18px; font-weight:500; color:{{ aLogColor }};\">{{ aLogLikelihood }}<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:14px; display:grid; grid-template-columns:auto 1fr; gap:7px 14px; font-size:14px;\">\n            <span style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; text-transform:uppercase; color:rgba(22,35,53,0.5); padding-top:2px;\">Based<\u002Fspan><span style=\"color:rgba(22,35,53,0.85);\">{{ aLogLocation }}<\u002Fspan>\n            <span style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; text-transform:uppercase; color:rgba(22,35,53,0.5); padding-top:2px;\">To VN<\u002Fspan><span style=\"color:rgba(22,35,53,0.85);\">{{ aLogDistance }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:16px; line-height:1.55; color:rgba(22,35,53,0.88); text-wrap:pretty;\">{{ aLogRead }}<\u002Fdiv>\n          <div style=\"margin-top:12px;\">\n            <sc-for list=\"{{ aLogSignals }}\" as=\"s\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex; gap:9px; align-items:flex-start; padding:6px 0; border-top:1px solid rgba(22,35,53,0.08); font-size:14px; line-height:1.5;\"><span style=\"color:{{ s.color }}; flex-shrink:0; font-family:'Söhne Mono',monospace;\">{{ s.mark }}<\u002Fspan><span style=\"color:rgba(22,35,53,0.82);\">{{ s.t }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== INTERVIEW SUMMARY ===== -->\n    <div style=\"margin-top:42px;\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; border-bottom:1px solid rgba(22,35,53,0.15); padding-bottom:9px;\">\n        <h2 style=\"margin:0; font-size:23px; font-weight:500; letter-spacing:-0.02em;\">Interview summary<\u002Fh2>\n      <\u002Fdiv>\n      <sc-if value=\"{{ aHasInterview }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:16px; border:1px solid rgba(22,35,53,0.12); border-top:2px solid #162335; background:#fff; padding:20px 22px;\">\n          <div style=\"font-family:'Söhne Mono',monospace; font-size:12px; letter-spacing:0.03em; color:rgba(22,35,53,0.6);\">{{ aIntTitle }}<\u002Fdiv>\n          <div style=\"margin-top:10px; font-size:16px; line-height:1.55; color:rgba(22,35,53,0.88); text-wrap:pretty;\">{{ aIntFit }}<\u002Fdiv>\n          <div style=\"margin-top:12px;\">\n            <sc-for list=\"{{ aIntPoints }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; gap:9px; align-items:flex-start; padding:6px 0; border-top:1px solid rgba(22,35,53,0.08); font-size:14.5px; line-height:1.5;\"><span style=\"color:{{ p.color }}; flex-shrink:0; font-family:'Söhne Mono',monospace;\">{{ p.mark }}<\u002Fspan><span style=\"color:rgba(22,35,53,0.82);\">{{ p.t }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <!-- Fireflies -->\n      <div style=\"margin-top:18px; border:1px solid rgba(22,35,53,0.12); background:#fff; padding:16px 18px;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;\">\n          <div style=\"display:flex; align-items:center; gap:9px;\"><span style=\"width:9px; height:9px; border-radius:9999px; background:#E74424; flex-shrink:0;\"><\u002Fspan><span style=\"font-family:'Söhne Mono',monospace; font-size:12px; letter-spacing:0.03em; text-transform:uppercase; color:#162335;\">Fireflies · connected<\u002Fspan><\u002Fdiv>\n          <span style=\"font-family:'Söhne Mono',monospace; font-size:12px; color:rgba(22,35,53,0.5);\">{{ aFfStatus }}<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ aHasFireflies }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:8px;\">\n            <sc-for list=\"{{ aFireflies }}\" as=\"f\" hint-placeholder-count=\"1\">\n              <div style=\"display:grid; grid-template-columns:1fr auto; gap:14px; align-items:center; padding:11px 0; border-top:1px solid rgba(22,35,53,0.08);\">\n                <div style=\"min-width:0;\"><div style=\"font-size:15px; font-weight:500; color:#162335;\">{{ f.title }}<\u002Fdiv><div style=\"margin-top:2px; font-family:'Söhne Mono',monospace; font-size:12px; color:rgba(22,35,53,0.55);\">{{ f.date }} · {{ f.dur }}<\u002Fdiv><\u002Fdiv>\n                <button onclick=\"{{ f.pull }}\" style=\"cursor:pointer; border:1px solid {{ f.pullColor }}; background:transparent; color:{{ f.pullColor }}; border-radius:9999px; padding:6px 16px; font-family:'Söhne Mono',monospace; font-size:12.5px; white-space:nowrap;\">{{ f.pullLabel }}<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ aFfEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:10px; font-size:14px; color:rgba(22,35,53,0.55);\">No Fireflies recordings matched this candidate yet — new meetings sync here automatically.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- transcript editor + save -->\n      <div style=\"margin-top:14px;\">\n        <div style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em; color:rgba(22,35,53,0.5); margin-bottom:6px;\">{{ aTranscriptLabel }}<\u002Fdiv>\n        <textarea value=\"{{ aTranscript }}\" onchange=\"{{ onTranscript }}\" placeholder=\"Paste an interview transcript, or pull one from Fireflies above — Claude folds it into this candidate's working file and fit read.\" style=\"width:100%; min-height:110px; resize:vertical; border:1px solid rgba(22,35,53,0.15); border-radius:4px; background:#fff; padding:12px 14px; font-family:'National 2',sans-serif; font-size:14px; line-height:1.55; color:#162335; outline:none;\" style-focus=\"border-color:#E74424;\"><\u002Ftextarea>\n        <div style=\"margin-top:10px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;\">\n          <button onclick=\"{{ saveTranscript }}\" style=\"cursor:pointer; border:none; background:#162335; color:#FAFAF7; border-radius:9999px; padding:9px 18px; font-family:'Söhne Mono',monospace; font-size:12.5px;\">Save transcript &amp; analyze<\u002Fbutton>\n          <sc-if value=\"{{ aTranscriptSaved }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'Söhne Mono',monospace; font-size:12px; color:#E74424;\">Saved ✓ · folded into working file<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== CANDIDATE WORKING FILE ===== -->\n    <div style=\"margin-top:42px;\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:16px; flex-wrap:wrap; border-bottom:1px solid rgba(22,35,53,0.15); padding-bottom:9px;\">\n        <h2 style=\"margin:0; font-size:23px; font-weight:500; letter-spacing:-0.02em;\">Candidate working file <span style=\"font-family:'Söhne Mono',monospace; font-size:13px; color:rgba(22,35,53,0.45);\">{{ aWorkingFileName }}<\u002Fspan><\u002Fh2>\n        <button onclick=\"{{ downloadMd }}\" style=\"cursor:pointer; border:1px solid rgba(22,35,53,0.22); background:transparent; color:#162335; border-radius:9999px; padding:7px 14px; font-family:'Söhne Mono',monospace; font-size:12.5px;\">Download .md ↓<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"margin-top:16px; display:grid; grid-template-columns:1fr 1fr; gap:0 40px; align-items:start;\">\n        <div>\n          <div style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em; color:rgba(22,35,53,0.5); margin-bottom:8px;\">Corrections &amp; analysis notes<\u002Fdiv>\n          <div style=\"font-size:14px; line-height:1.5; color:rgba(22,35,53,0.7); margin-bottom:10px;\">Tell Claude what it got wrong — a mis-parsed résumé, a real tenure, anything. It stays on this candidate and updates the record.<\u002Fdiv>\n          <textarea value=\"{{ corrDraft }}\" onchange=\"{{ onCorrDraft }}\" placeholder=\"e.g. Résumé mis-parsed — this person's Quartz Dx tenure was actually 19 years, not 3.\" style=\"width:100%; min-height:70px; resize:vertical; border:1px solid rgba(22,35,53,0.15); border-radius:4px; background:#fff; padding:11px 13px; font-family:'National 2',sans-serif; font-size:14px; line-height:1.5; color:#162335; outline:none;\" style-focus=\"border-color:#E74424;\"><\u002Ftextarea>\n          <button onclick=\"{{ addCorrection }}\" style=\"margin-top:9px; cursor:pointer; border:none; background:#162335; color:#FAFAF7; border-radius:9999px; padding:8px 16px; font-family:'Söhne Mono',monospace; font-size:12.5px;\">Save correction &amp; re-analyze<\u002Fbutton>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Söhne Mono',monospace; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em; color:rgba(22,35,53,0.5); margin-bottom:8px;\">Correction log<\u002Fdiv>\n          <sc-if value=\"{{ aHasCorrections }}\" hint-placeholder-val=\"{{ false }}\">\n            <sc-for list=\"{{ aCorrLog }}\" as=\"e\" hint-placeholder-count=\"2\">\n              <div style=\"border-left:2px solid #E74424; padding:3px 0 3px 12px; margin-bottom:12px;\">\n                <div style=\"font-family:'Söhne Mono',monospace; font-size:11px; color:rgba(22,35,53,0.45);\">{{ e.ts }} · applied<\u002Fdiv>\n                <div style=\"margin-top:3px; font-size:14.5px; line-height:1.5; color:#162335;\">{{ e.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ aNoCorrections }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:14px; color:rgba(22,35,53,0.5);\">No corrections yet. The record reflects Claude's parse of the submitted materials.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { view: 'pool', activeId: 'prashanthi', filter: 'all', dq: {}, tlEditing: false, ovr: {}, replies: {}, corrections: {}, transcripts: {}, corrDraft: '', tdraft: '', deep: {} };\n  WS_KEY = 'rdi-recruit-ws-v1';\n  WSUB = 'rditrials';\n  WJOB = '1284673';\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem(this.WS_KEY);\n      if (raw) {\n        const d = JSON.parse(raw);\n        this.setState({ dq: d.dq || {}, ovr: d.ovr || {}, replies: d.replies || {}, corrections: d.corrections || {}, transcripts: d.transcripts || {}, deep: d.deep || {}, tdraft: (d.transcripts || {})[this.state.activeId] || '' });\n      }\n    } catch (e) {}\n  }\n  save(patch) {\n    this.setState(patch, () => {\n      try {\n        const s = this.state;\n        localStorage.setItem(this.WS_KEY, JSON.stringify({ dq: s.dq, ovr: s.ovr, replies: s.replies, corrections: s.corrections, transcripts: s.transcripts, deep: s.deep }));\n      } catch (e) {}\n    });\n  }\n  now() {\n    const d = new Date();\n    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });\n  }\n  wcand(id) { let h = 0; for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0; return '50' + String(100000000 + (h % 900000000)); }\n  jobUrl() { return 'https://' + this.WSUB + '.workable.com/backend/jobs/' + this.WJOB; }\n  candUrl(id) { return this.jobUrl() + '/candidates/' + this.wcand(id); }\n\n  DM(d) {\n    const m = {\n      interview: { label: 'Interview first', c: '#E74424', bg: 'rgba(231,68,36,0.10)', b: 'rgba(231,68,36,0.32)' },\n      short:     { label: 'Short screen',    c: '#162335', bg: 'rgba(22,35,53,0.06)', b: 'rgba(22,35,53,0.22)' },\n      verify:    { label: 'Verify first',    c: '#162335', bg: 'transparent',          b: 'rgba(22,35,53,0.30)' },\n      hold:      { label: 'Hold',            c: 'rgba(22,35,53,0.55)', bg: 'transparent', b: 'rgba(22,35,53,0.16)' },\n      cut:       { label: 'Cut',             c: '#9E3B28', bg: 'rgba(158,59,40,0.07)', b: 'rgba(158,59,40,0.24)' },\n      blocked:   { label: 'Review blocked',  c: '#E74424', bg: 'transparent',          b: 'rgba(231,68,36,0.32)' },\n    };\n    return m[d] || m.hold;\n  }\n  REV(r) {\n    const m = {\n      none:         { label: 'Not reviewed',      dot: 'rgba(22,35,53,0.20)', c: 'rgba(22,35,53,0.45)' },\n      conallPos:    { label: 'Conall positive',   dot: '#162335', c: '#162335' },\n      conallConcern:{ label: 'Conall concern',    dot: '#9E3B28', c: '#9E3B28' },\n      laraPos:      { label: 'Lara positive',     dot: '#162335', c: '#162335' },\n      laraConcern:  { label: 'Lara concern',      dot: '#9E3B28', c: '#9E3B28' },\n      laraNo:       { label: 'Lara hard no',      dot: '#9E3B28', c: '#9E3B28' },\n      mixed:        { label: 'Mixed signal',      dot: '#E74424', c: '#E74424' },\n      second:       { label: 'Needs second read', dot: '#E74424', c: '#E74424' },\n    };\n    return m[r] || m.none;\n  }\n  SIG(s) {\n    const m = {\n      Positive:  { c: '#162335', bg: 'rgba(22,35,53,0.06)' },\n      Promotion: { c: '#E74424', bg: 'rgba(231,68,36,0.10)' },\n      Learning:  { c: 'rgba(22,35,53,0.6)', bg: 'rgba(22,35,53,0.05)' },\n      Strong:    { c: '#E74424', bg: 'rgba(231,68,36,0.10)' },\n      Verify:    { c: '#9E3B28', bg: 'rgba(158,59,40,0.08)' },\n      Ask:       { c: '#9E3B28', bg: 'rgba(158,59,40,0.08)' },\n      Gap:       { c: '#9E3B28', bg: 'rgba(158,59,40,0.08)' },\n      Cert:      { c: '#162335', bg: 'rgba(22,35,53,0.06)' },\n      Connected: { c: '#162335', bg: 'rgba(22,35,53,0.06)' },\n      Switched:  { c: '#9E3B28', bg: 'rgba(158,59,40,0.08)' },\n      Inflated:  { c: '#9E3B28', bg: 'rgba(158,59,40,0.08)' },\n    };\n    return m[s] || m.Positive;\n  }\n  // comment kinds for cover letter / answers\n  CM(k) {\n    const m = {\n      ai:      { label: 'AI-written?',   color: '#9E3B28', hl: 'rgba(158,59,40,0.10)' },\n      wrong:   { label: 'Wrong company', color: '#9E3B28', hl: 'rgba(158,59,40,0.14)' },\n      typo:    { label: 'Typo / sloppy', color: '#9E3B28', hl: 'rgba(158,59,40,0.10)' },\n      flag:    { label: 'Red flag',      color: '#9E3B28', hl: 'rgba(158,59,40,0.10)' },\n      thin:    { label: 'Thin / generic',color: '#9E3B28', hl: 'rgba(158,59,40,0.08)' },\n      good:    { label: 'Paid attention',color: '#162335', hl: 'transparent' },\n      ask:     { label: 'Ask this live', color: '#162335', hl: 'transparent' },\n      neutral: { label: 'Note',          color: 'rgba(22,35,53,0.5)', hl: 'transparent' },\n    };\n    return m[k] || m.neutral;\n  }\n  askColor(t) { return { top: '#9E3B28', high: '#9E3B28', mid: '#162335', value: '#E74424', below: '#E74424' }[t] || '#162335'; }\n  logColor(l) { return { High: '#162335', Medium: '#E74424', Low: '#9E3B28' }[l] || '#162335'; }\n\n  data() {\n    return [\n      // =================== PRASHANTHI — survivor ===================\n      {\n        id: 'prashanthi', rank: 1, name: 'Prashanthi P.', role: 'Senior Clinical Data Manager', company: 'Quartz Dx',\n        salary: '$100k', salaryNum: 100, decision: 'interview', rev: 'conallPos',\n        revNote: 'Best data-integrity evidence in the pool; wants the first slot.',\n        why: 'Best data-integrity evidence in the pool — query-resolution and lock cycles with real mechanics.',\n        flag: 'No IVD / diagnostics domain — all experience is pharma EDC.', next: 'Screen', survivor: true,\n        askTier: 'below', askNote: '$8k under pool median', roLevel: 'RO-4', roVsPool: 'Mid-senior IC — in line with the role',\n        mismatch: false, mismatchRead: 'Below-median ask for the strongest file. Ask sits under her demonstrated level — value, not risk.',\n        timeline: [\n          { type: 'edu', period: '2011–2015', org: 'UC Davis', role: 'BS, Molecular Biology', tenure: '4.0 yrs', scope: 'Science degree — connects directly to clinical data', lang: '—', signal: 'Connected' },\n          { type: 'role', period: '2015–2017', org: 'Cerulean CRO', role: 'Clinical Data Associate', tenure: '2.0 yrs', scope: 'Entry execution — query handling, CRF tracking', lang: 'Reads RO-1, scope RO-1 — matched', signal: 'Learning' },\n          { type: 'role', period: '2017–2019', org: 'Cerulean CRO', role: 'Clinical Data Coordinator', tenure
